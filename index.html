<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presentación Interactiva - Plan de Desarrollo Territorial de Marquetalia 2024–2027</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="deck" id="deck">
    <div class="bg-image" id="bgImage"></div>
    <div class="ambient">
      <div class="blob one"></div>
      <div class="blob two"></div>
      <div class="blob three"></div>
    </div>

    <div class="hint">
      <strong>Navegación</strong><br />
      Flecha derecha: avanzar · Flecha izquierda: retroceder<br />
      F: pantalla completa · M: sonido · Inicio/Fin: ir al principio/final
    </div>

    <main class="slides" id="slides"></main>

    <div class="controls">
      <div class="controls-left">
        <button class="btn" id="prevBtn" type="button">◀ Anterior</button>
        <button class="btn primary" id="fullscreenBtn" type="button">⛶ Pantalla completa</button>
        <button class="btn" id="soundBtn" type="button">🔊 Sonido: ON</button>
      </div>
      <div class="progress" aria-label="Progreso de la presentación">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="controls-right">
        <div class="counter" id="counter">1 / 1</div>
        <button class="btn" id="nextBtn" type="button">Siguiente ▶</button>
      </div>
    </div>
  </div>

  <script src="js/slides.js" defer></script>
  <script src="js/main.js" defer></script>
</body>
</html>
