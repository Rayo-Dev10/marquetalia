<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presentación Interactiva - Plan de Desarrollo Territorial de Marquetalia 2024–2027</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07140f;
      --bg-2: #0b2018;
      --panel: rgba(11, 32, 24, 0.62);
      --panel-strong: rgba(8, 24, 18, 0.82);
      --line: rgba(180, 255, 204, 0.18);
      --text: #effcf4;
      --muted: #c3e8ce;
      --accent: #9be15d;
      --accent-2: #00e3ae;
      --accent-3: #f7d774;
      --danger: #ff8c7a;
      --shadow: 0 20px 80px rgba(0,0,0,0.38);
      --radius: 26px;
      --slide-pad: clamp(20px, 3vw, 42px);
      --title: clamp(2rem, 4vw, 4.5rem);
      --subtitle: clamp(1rem, 1.5vw, 1.25rem);
      --body: clamp(1rem, 1.15vw, 1.2rem);
      --small: clamp(.82rem, .9vw, .98rem);
      --transition: 700ms cubic-bezier(.2,.8,.2,1);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: 'Montserrat', sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(155,225,93,.18), transparent 28%),
        radial-gradient(circle at 80% 18%, rgba(0,227,174,.16), transparent 22%),
        radial-gradient(circle at 50% 100%, rgba(247,215,116,.08), transparent 30%),
        linear-gradient(135deg, var(--bg), #081a13 38%, #06110d 100%);
      color: var(--text);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: .18;
      pointer-events: none;
      mask-image: radial-gradient(circle at center, black 45%, transparent 100%);
    }

    .deck {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      isolation: isolate;
    }

    .bg-image {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: brightness(.38) saturate(1.15);
      transform: scale(1.08);
      transition: transform 10s ease, opacity 1s ease;
      opacity: .92;
      z-index: -3;
    }

    .bg-image::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(145deg, rgba(4, 14, 9, 0.35), rgba(4, 12, 9, 0.82)),
        radial-gradient(circle at 20% 20%, rgba(155,225,93,.15), transparent 20%),
        radial-gradient(circle at 80% 15%, rgba(0,227,174,.12), transparent 18%);
    }

    .ambient {
      position: absolute;
      inset: 0;
      z-index: -2;
      overflow: hidden;
      pointer-events: none;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      opacity: .18;
      animation: floatBlob 12s ease-in-out infinite;
      mix-blend-mode: screen;
    }
    .blob.one { width: 260px; height: 260px; top: 10%; left: 6%; background: var(--accent); }
    .blob.two { width: 220px; height: 220px; right: 12%; top: 18%; background: var(--accent-2); animation-delay: -4s; }
    .blob.three { width: 300px; height: 300px; left: 38%; bottom: -8%; background: var(--accent-3); animation-delay: -8s; }

    @keyframes floatBlob {
      0%,100% { transform: translate(0,0) scale(1); }
      25% { transform: translate(24px,-16px) scale(1.06); }
      50% { transform: translate(-18px,10px) scale(.96); }
      75% { transform: translate(16px,20px) scale(1.04); }
    }

    .slides {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .slide {
      position: absolute;
      inset: 0;
      padding: var(--slide-pad);
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 26px;
      align-items: stretch;
      opacity: 0;
      transform: translateX(8%) scale(.96) rotateY(-6deg);
      pointer-events: none;
      transition: opacity var(--transition), transform var(--transition), filter var(--transition);
      filter: blur(10px);
    }

    .slide.active {
      opacity: 1;
      transform: translateX(0) scale(1) rotateY(0deg);
      pointer-events: auto;
      filter: blur(0);
    }

    .slide.prev {
      transform: translateX(-12%) scale(.94) rotateY(8deg);
    }

    .panel {
      background: linear-gradient(180deg, rgba(10,28,20,.66), rgba(5,18,12,.78));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      overflow: hidden;
      position: relative;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(255,255,255,.08), transparent 28%, transparent 70%, rgba(255,255,255,.04));
      pointer-events: none;
    }

    .main {
      padding: clamp(24px, 3vw, 40px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
    }

    .side {
      padding: clamp(18px, 2vw, 26px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 16px;
      min-height: 0;
    }

    .eyebrow {
      display: inline-flex;
      gap: 10px;
      align-items: center;
      font-size: var(--small);
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 10px;
    }

    .eyebrow::before {
      content: "";
      width: 42px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
      display: inline-block;
      border-radius: 999px;
    }

    h1, h2 {
      margin: 0 0 12px;
      line-height: .98;
      font-weight: 800;
      letter-spacing: -.03em;
    }

    h1 { font-size: var(--title); }
    h2 { font-size: clamp(1.7rem, 3vw, 3rem); }

    .lede {
      font-size: var(--subtitle);
      line-height: 1.65;
      color: var(--muted);
      max-width: 70ch;
      margin-bottom: 14px;
    }

    .copy {
      font-size: var(--body);
      line-height: 1.68;
      color: #f1fff5;
    }

    .copy p { margin: 0 0 14px; }

    .grid-cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .card {
      padding: 16px 16px 14px;
      border-radius: 20px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      transform: translateY(18px);
      opacity: 0;
      transition: transform .7s ease, opacity .7s ease, background .3s ease;
    }
    .slide.active .card { transform: translateY(0); opacity: 1; }
    .slide.active .card:nth-child(2) { transition-delay: .08s; }
    .slide.active .card:nth-child(3) { transition-delay: .14s; }
    .slide.active .card:nth-child(4) { transition-delay: .2s; }
    .card:hover { background: rgba(255,255,255,.09); }

    .card h3 {
      margin: 0 0 8px;
      font-size: 1rem;
      color: var(--accent-3);
    }

    .card p, .card li {
      margin: 0;
      color: #ecfff4;
      font-size: .98rem;
      line-height: 1.55;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      color: var(--text);
      font-size: .92rem;
      font-weight: 600;
      backdrop-filter: blur(10px);
    }

    .hero-kpis {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 22px;
    }

    .kpi {
      padding: 18px;
      border-radius: 22px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.09);
      text-align: left;
    }

    .kpi .num {
      display: block;
      font-size: clamp(1.7rem, 3vw, 2.6rem);
      font-weight: 800;
      letter-spacing: -.04em;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .kpi .label { color: var(--muted); font-size: .95rem; line-height: 1.4; }

    .visual-stack {
      display: grid;
      gap: 14px;
      min-height: 0;
    }

    .image-card {
      position: relative;
      border-radius: 22px;
      overflow: hidden;
      min-height: 180px;
      border: 1px solid rgba(255,255,255,.08);
      background-size: cover;
      background-position: center;
      transform: scale(.96) translateY(24px);
      opacity: 0;
      transition: transform .8s ease, opacity .8s ease;
    }
    .slide.active .image-card { opacity: 1; transform: scale(1) translateY(0); }
    .slide.active .image-card:nth-child(2){ transition-delay: .12s; }
    .slide.active .image-card:nth-child(3){ transition-delay: .22s; }

    .image-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(7,20,15,.12), rgba(7,20,15,.72));
    }

    .image-label {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 14px;
      z-index: 1;
      font-size: .95rem;
      font-weight: 700;
    }

    .bar-chart {
      display: grid;
      gap: 12px;
      padding: 4px 2px 2px;
    }

    .bar-row { display: grid; gap: 6px; }
    .bar-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: .93rem;
      color: #ecfff4;
    }
    .bar-track {
      width: 100%;
      height: 12px;
      background: rgba(255,255,255,.08);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.08);
    }
    .bar-fill {
      width: 0;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 18px rgba(155,225,93,.35);
      transition: width 1.1s cubic-bezier(.2,.8,.2,1);
    }
    .slide.active .bar-fill { width: var(--w); }

    .budget-ring-wrap {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 18px;
      align-items: center;
    }

    .ring {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, rgba(6,17,13,1) 0 42%, transparent 42% 100%),
        conic-gradient(
          var(--accent) 0 6%,
          #7be495 6% 12%,
          var(--accent-2) 12% 41%,
          #5dd7c4 41% 44%,
          var(--accent-3) 44% 100%
        );
      display: grid;
      place-items: center;
      box-shadow: inset 0 0 0 18px rgba(255,255,255,.04), 0 22px 70px rgba(0,0,0,.28);
      transform: scale(.9) rotate(-30deg);
      opacity: 0;
      transition: transform .9s ease, opacity .9s ease;
    }
    .slide.active .ring { transform: scale(1) rotate(0deg); opacity: 1; }

    .ring .center {
      width: 126px;
      height: 126px;
      border-radius: 50%;
      background: rgba(5,17,13,.95);
      border: 1px solid rgba(255,255,255,.08);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 16px;
    }

    .ring .center strong { display: block; font-size: 1.55rem; color: var(--text); }
    .ring .center span { font-size: .82rem; color: var(--muted); line-height: 1.35; }

    .legend {
      display: grid;
      gap: 10px;
    }

    .legend-item {
      display: grid;
      grid-template-columns: 16px 1fr auto;
      gap: 12px;
      align-items: start;
      padding: 12px 14px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
    }

    .dot { width: 12px; height: 12px; border-radius: 50%; margin-top: 4px; }

    .timeline {
      display: grid;
      gap: 12px;
      margin-top: 18px;
      position: relative;
    }
    .timeline::before {
      content: "";
      position: absolute;
      left: 13px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(var(--accent), rgba(255,255,255,.04));
    }

    .timeline-item {
      position: relative;
      padding-left: 42px;
      opacity: 0;
      transform: translateX(12px);
      transition: .6s ease;
    }
    .slide.active .timeline-item { opacity: 1; transform: translateX(0); }
    .slide.active .timeline-item:nth-child(2){ transition-delay: .1s; }
    .slide.active .timeline-item:nth-child(3){ transition-delay: .2s; }
    .slide.active .timeline-item:nth-child(4){ transition-delay: .3s; }
    .slide.active .timeline-item:nth-child(5){ transition-delay: .4s; }

    .timeline-item::before {
      content: "";
      position: absolute;
      left: 7px;
      top: 8px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(155,225,93,.12);
    }

    .timeline-item h3 { margin: 0 0 6px; font-size: 1rem; color: var(--accent-3); }
    .timeline-item p { margin: 0; color: var(--muted); line-height: 1.55; font-size: .96rem; }

    .controls {
      position: fixed;
      left: 18px;
      right: 18px;
      bottom: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      z-index: 30;
    }

    .controls-left, .controls-right { display: flex; align-items: center; gap: 10px; }

    .btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(7, 21, 15, .72);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: .02em;
      cursor: pointer;
      backdrop-filter: blur(14px);
      transition: .25s ease;
      box-shadow: 0 12px 30px rgba(0,0,0,.22);
    }

    .btn:hover { transform: translateY(-2px) scale(1.02); background: rgba(13,30,23,.86); }
    .btn:active { transform: translateY(0) scale(.98); }
    .btn.primary { background: linear-gradient(135deg, rgba(155,225,93,.18), rgba(0,227,174,.18)); }

    .progress {
      flex: 1;
      max-width: 520px;
      min-width: 180px;
      height: 10px;
      background: rgba(255,255,255,.08);
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.08);
      overflow: hidden;
      position: relative;
    }
    .progress-bar {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: inherit;
      transition: width .55s ease;
      box-shadow: 0 0 18px rgba(155,225,93,.45);
    }

    .counter {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(7, 21, 15, .72);
      border: 1px solid rgba(255,255,255,.12);
      font-weight: 700;
      font-size: .92rem;
      color: var(--muted);
      min-width: 82px;
      text-align: center;
    }

    .hint {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 30;
      background: rgba(7,21,15,.72);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 18px;
      padding: 12px 16px;
      color: var(--muted);
      font-size: .88rem;
      line-height: 1.45;
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 30px rgba(0,0,0,.2);
    }

    .quote {
      margin-top: 16px;
      padding: 16px 18px;
      border-left: 4px solid var(--accent-3);
      background: rgba(255,255,255,.05);
      border-radius: 0 18px 18px 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    .footnote {
      font-size: .84rem;
      color: #b9ddc7;
      line-height: 1.5;
      opacity: .95;
    }

    .mini-list {
      margin: 0;
      padding-left: 1.15rem;
      color: #effcf4;
      line-height: 1.6;
    }

    .mini-list li + li { margin-top: 8px; }

    .cover-tag {
      display: inline-flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .cover-badge {
      padding: 11px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      font-size: .92rem;
      font-weight: 700;
      color: #f5fff8;
    }

    .audio-panel {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .audio-note {
      font-size: .86rem;
      color: var(--muted);
      line-height: 1.4;
    }

    @media (max-width: 1100px) {
      .slide {
        grid-template-columns: 1fr;
        gap: 18px;
        overflow-y: auto;
        padding-bottom: 100px;
      }
      .budget-ring-wrap { grid-template-columns: 1fr; justify-items: center; }
      .hero-kpis { grid-template-columns: 1fr 1fr; }
      .grid-cards { grid-template-columns: 1fr; }
      .hint { left: 18px; right: auto; max-width: calc(100vw - 36px); }
    }

    @media (max-width: 720px) {
      .hero-kpis { grid-template-columns: 1fr; }
      .controls { flex-direction: column; align-items: stretch; }
      .controls-left, .controls-right { justify-content: space-between; }
      .progress { max-width: none; }
      .btn { flex: 1; text-align: center; }
      .counter { min-width: 68px; }
    }
  </style>
</head>
<body>
  <div class="deck" id="deck">
    <div class="bg-image" id="bgImage"></div>
    <div class="ambient">
      <div class="blob one"></div>
      <div class="blob two"></div>
      <div class="blob three"></div>
    </div>

    <div class="hint">
      <strong>Navegación</strong><br>
      Flecha derecha: avanzar · Flecha izquierda: retroceder<br>
      F: pantalla completa · M: sonido · Inicio/Fin: ir al principio/final
    </div>

    <main class="slides" id="slides"></main>

    <div class="controls">
      <div class="controls-left">
        <button class="btn" id="prevBtn">◀ Anterior</button>
        <button class="btn primary" id="fullscreenBtn">⛶ Pantalla completa</button>
        <button class="btn" id="soundBtn">🔊 Sonido: ON</button>
      </div>
      <div class="progress" aria-label="Progreso de la presentación">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="controls-right">
        <div class="counter" id="counter">1 / 8</div>
        <button class="btn" id="nextBtn">Siguiente ▶</button>
      </div>
    </div>
  </div>

  <script>
    const slides = [
      {
        bg: 'https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&q=80',
        title: 'Plan de Desarrollo Territorial de Marquetalia 2024–2027',
        eyebrow: 'Presentación interactiva',
        subtitle: '“Marquetalia avanza, 100 años de historia” como hoja de ruta pública del municipio.',
        main: `
          <p>El Plan de Desarrollo Territorial organiza la acción pública de Marquetalia en <strong>cuatro líneas estratégicas</strong>, complementadas con capítulos especiales de <strong>TIC</strong> y <strong>regalías</strong>.</p>
          <p>El documento reporta <strong>94 indicadores de resultado</strong>, <strong>310 indicadores de producto</strong> y <strong>7 iniciativas priorizadas</strong> para el Sistema General de Regalías.</p>
          <div class="cover-tag">
            <span class="cover-badge">4 líneas estratégicas</span>
            <span class="cover-badge">94 indicadores de resultado</span>
            <span class="cover-badge">310 indicadores de producto</span>
            <span class="cover-badge">7 iniciativas SGR</span>
          </div>
          <div class="quote">Esta presentación resume el contenido central para documento escrito y socialización oral de 6 minutos.</div>
        `,
        sideTop: '<h2>Visión general</h2><p class="lede">Una lectura ejecutiva del plan, con énfasis en líneas estratégicas, proyectos clave, indicadores y presupuesto.</p>',
        sideMid: `
          <div class="hero-kpis">
            <div class="kpi"><span class="num">4</span><span class="label">Líneas estratégicas que estructuran el plan</span></div>
            <div class="kpi"><span class="num">94</span><span class="label">Indicadores de resultado para seguimiento</span></div>
            <div class="kpi"><span class="num">310</span><span class="label">Indicadores de producto por sectores y programas</span></div>
          </div>
        `,
        sideBottom: '<div class="footnote">Tema central: desarrollo social, crecimiento económico, gobernanza, seguridad y sostenibilidad ambiental.</div>'
      },
      {
        bg: 'https://images.unsplash.com/photo-1517048676732-d65bc937f952?auto=format&fit=crop&w=1600&q=80',
        title: 'Línea estratégica 1',
        eyebrow: 'Sociedad justa y recuperación del tejido social',
        subtitle: 'Integra educación, salud, vivienda, servicios públicos, deporte, cultura y territorio de paz.',
        main: `
          <p>La primera línea estratégica es <strong>“Marquetalia avanza hacia una sociedad más justa y equitativa, y en la recuperación del tejido social”</strong>.</p>
          <p>Sus programas más relevantes incluyen: mejoramiento de la calidad educativa, acceso a educación superior, alfabetización de adultos, fortalecimiento de la atención en salud, salud pública, control sanitario, soluciones de vivienda, ordenamiento territorial, agua potable, servicios públicos, deporte, cultura y atención a víctimas y población vulnerable.</p>
          <div class="grid-cards">

    const slidesRoot = document.getElementById('slides');
    const bgImage = document.getElementById('bgImage');
    const progressBar = document.getElementById('progressBar');
    const counter = document.getElementById('counter');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const soundBtn = document.getElementById('soundBtn');
    const deck = document.getElementById('deck');

    let current = 0;
    let soundEnabled = true;
    let audioCtx = null;

    function buildSlides() {
      slidesRoot.innerHTML = slides.map((slide, index) => `
        <section class="slide ${index === 0 ? 'active' : ''}" data-index="${index}">
          <div class="panel main">
            <div class="eyebrow">${slide.eyebrow}</div>
            <h1>${slide.title}</h1>
            <p class="lede">${slide.subtitle}</p>
            <div class="copy">${slide.main}</div>
          </div>
          <aside class="panel side">
            <div>${slide.sideTop}</div>
            <div>${slide.sideMid}</div>
            <div>${slide.sideBottom}</div>
          </aside>
        </section>
      `).join('');
    }

    function updateSlide(direction = 1) {
      const all = [...document.querySelectorAll('.slide')];
      all.forEach((slide, i) => {
        slide.classList.remove('active', 'prev');
        if (i === current) slide.classList.add('active');
        if (i < current) slide.classList.add('prev');
      });
      bgImage.style.backgroundImage = `url('${slides[current].bg}')`;
      bgImage.style.transform = `scale(${1.06 + (current % 3) * 0.02})`;
      progressBar.style.width = `${((current + 1) / slides.length) * 100}%`;
      counter.textContent = `${current + 1} / ${slides.length}`;
      pulseAccent(direction);
      playSlideTone(direction);
    }

    function nextSlide() {
      current = (current + 1) % slides.length;
      updateSlide(1);
    }

    function prevSlide() {
      current = (current - 1 + slides.length) % slides.length;
      updateSlide(-1);
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        deck.requestFullscreen?.();
      } else {
        document.exitFullscreen?.();
      }
    }

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSlideTone(direction = 1) {
      if (!soundEnabled) return;
      try {
        ensureAudio();
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const osc2 = audioCtx.createOscillator();
        const gain2 = audioCtx.createGain();

        osc.type = 'sine';
        osc2.type = 'triangle';

        const base = direction > 0 ? 540 : 420;
        osc.frequency.setValueAtTime(base, now);
        osc.frequency.exponentialRampToValueAtTime(direction > 0 ? 760 : 330, now + 0.18);
        osc2.frequency.setValueAtTime(base / 2, now);
        osc2.frequency.exponentialRampToValueAtTime(direction > 0 ? 620 : 280, now + 0.18);

        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.04, now + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);

        gain2.gain.setValueAtTime(0.0001, now);
        gain2.gain.exponentialRampToValueAtTime(0.02, now + 0.04);
        gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.24);

        osc.connect(gain).connect(audioCtx.destination);
        osc2.connect(gain2).connect(audioCtx.destination);
        osc.start(now);
        osc2.start(now);
        osc.stop(now + 0.24);
        osc2.stop(now + 0.24);
      } catch (e) {}
    }

    function pulseAccent(direction = 1) {
      const pulse = document.createElement('div');
      pulse.style.position = 'fixed';
      pulse.style.inset = '0';
      pulse.style.pointerEvents = 'none';
      pulse.style.background = direction > 0
        ? 'radial-gradient(circle at 85% 30%, rgba(155,225,93,.12), transparent 22%)'
        : 'radial-gradient(circle at 15% 30%, rgba(0,227,174,.12), transparent 22%)';
      pulse.style.opacity = '0';
      pulse.style.transition = 'opacity .22s ease';
      document.body.appendChild(pulse);
      requestAnimationFrame(() => pulse.style.opacity = '1');
      setTimeout(() => {
        pulse.style.opacity = '0';
        setTimeout(() => pulse.remove(), 250);
      }, 120);
    }

    document.addEventListener('keydown', (e) => {
      if (['ArrowRight', 'PageDown', ' '].includes(e.key)) {
        e.preventDefault();
        nextSlide();
      }
      if (['ArrowLeft', 'PageUp'].includes(e.key)) {
        e.preventDefault();
        prevSlide();
      }
      if (e.key === 'Home') {
        current = 0;
        updateSlide(1);
      }
      if (e.key === 'End') {
        current = slides.length - 1;
        updateSlide(1);
      }
      if (e.key.toLowerCase() === 'f') toggleFullscreen();
      if (e.key.toLowerCase() === 'm') toggleSound();
    });

    function toggleSound() {
      soundEnabled = !soundEnabled;
      soundBtn.textContent = soundEnabled ? '🔊 Sonido: ON' : '🔇 Sonido: OFF';
      if (soundEnabled) playSlideTone(1);
    }

    prevBtn.addEventListener('click', prevSlide);
    nextBtn.addEventListener('click', nextSlide);
    fullscreenBtn.addEventListener('click', toggleFullscreen);
    soundBtn.addEventListener('click', toggleSound);
    deck.addEventListener('click', (e) => {
      if (e.target.closest('.btn')) return;
      ensureAudio();
    });

    document.addEventListener('fullscreenchange', () => {
      fullscreenBtn.textContent = document.fullscreenElement ? '🡽 Salir de pantalla completa' : '⛶ Pantalla completa';
    });

    buildSlides();
    updateSlide(1);
  </script>
